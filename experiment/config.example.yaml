random_seed: 7
max_examples_per_dataset: 200
temperatures: [0.0, 0.7]
bootstrap_resamples: 2000

faithfulness_verifier:
  # options: heuristic | openai_compatible
  type: heuristic
  endpoint: https://api.openai.com/v1/chat/completions
  model: gpt-4.1
  api_key_env: OPENAI_API_KEY
  timeout_s: 120

models:
  - name: gpt-4.1
    provider: openai_compatible
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
  - name: claude-3-7-sonnet
    provider: mock

benchmarks:
  - name: gsm8k
    path: data/gsm8k.jsonl
    category: logical_symbolic
  - name: commonsenseqa
    path: data/commonsenseqa.jsonl
    category: semantic
  - name: strategyqa
    path: data/strategyqa.jsonl
    category: semantic
  - name: mmcot
    path: data/mmcot.jsonl
    category: multimodal

perturbations:
  types:
    - lexical_paraphrase
    - semantic_distractor
    - intermediate_wrong_step
    - skipped_step
    - contradictory_evidence
    - unit_value_change
  positions: [beginning, middle, end]

output_dir: outputs
